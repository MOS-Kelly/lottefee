<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데 집하 수수료 계산기</title>
    <style>
        /* [CSS 스타일] */
        .calculator-box {
            max-width: 600px;
            margin: 20px auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background-color: #fff;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* 박스에 살짝 음영을 주어 고급스럽게 변경 */
        }
        /* 메인 타이틀 스타일 */
        .main-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #1e293b;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #475569;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        #calc_btn {
            width: 100%;
            padding: 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #calc_btn:hover {
            background-color: #2563eb; /* 마우스 올렸을 때 살짝 어두워지는 효과 */
        }
        .divider {
            border-top: 1px solid #e2e8f0;
            margin: 25px 0;
        }
        .result-box {
            margin: 20px 0;
            padding: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
        }
        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }
        .total-price {
            color: #e11d48;
            font-size: 22px;
        }
        .notice-box {
            margin: 25px auto 5px auto;
            padding: 15px;
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 4px;
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
            text-align: left; /* 안내문 가독성을 위해 좌측 정렬로 수정 */
            max-width: 95%;
        }
        .notice-box p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="calculator-box">
        <div class="main-title">📦 롯데 집하 수수료 계산기</div>
        
        <div class="input-group">
            <label for="calc_fare">운임 입력 (원)</label>
            <input type="number" id="calc_fare" placeholder="예: 3500">
        </div>

        <button id="calc_btn">계산하기</button>

        <div class="divider"></div>

        <div class="result-box">
            <div style="display: none;"><span id="out_rate">0</span></div>
            
            <div class="result-row total">
                <span>예상 수수료</span>
                <span class="total-price"><span id="out_result">0</span> 원</span>
            </div>
        </div>

        <div class="notice-box">
            <p>💡 기타, 도서산간 등 기본운임에 추가 발생한 금액은 롯데 측에 전액 귀속되는 금액으로 수수료에 반영되지 않으며, 일반적으로 <strong>총운임 - 사회적합의비용</strong> 기준으로 수수료 발생하여 정산됩니다.</p>
            <p>💡 발생하는 변수에 따라서 일부 수수료는 계산한것과 다르게 책정될 수 있습니다. 집하 영업 시 평균 단가 참고하는 용도로만 사용 부탁드리겠습니다.</p>
        </div>
    </div>

    <script>
        // [자바스크립트 로직]
        function find_rate(baseFare) {
            if (baseFare <= 1599) return 12;
            if (baseFare <= 1799) return 14;
            if (baseFare <= 1999) return 15;
            if (baseFare <= 2099) return 17;
            if (baseFare <= 2199) return 18;
            if (baseFare <= 2399) return 20;
            if (baseFare <= 2499) return 21;
            if (baseFare <= 2599) return 23;
            if (baseFare <= 2749) return 25;
            if (baseFare <= 2999) return 26;
            if (baseFare <= 3499) return 27;
            if (baseFare <= 3999) return 29;
            if (baseFare <= 4999) return 31;
            return 33;
        }

        function run_calculation() {
            const fareValue = document.getElementById("calc_fare").value.trim();
            const fare = parseFloat(fareValue);

            if (isNaN(fare) || fare <= 170) {
                alert("170원보다 큰 정확한 운임 금액을 입력해주세요.");
                return;
            }

            const baseFare = fare - 170;
            const rate = find_rate(baseFare);
            const finalFee = Math.floor(baseFare * (rate / 100));

            const outRateEl = document.getElementById("out_rate");
            const outResultEl = document.getElementById("out_result");
            
            if (outRateEl) outRateEl.innerText = rate;
            if (outResultEl) {
                outResultEl.innerText = finalFee.toLocaleString();
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const calcBtn = document.getElementById('calc_btn');
            if (calcBtn) {
                calcBtn.addEventListener('click', run_calculation);
            }
        });
    </script>
</body>
</html>
